<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Agenda</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       BASE RESET
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: hsla(221, 39%, 11%, 1); /* matches Classroomscreen --color-theme-background */
      color: #ffffff;
      font-family: 'Quicksand', 'Verdana', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ============================================================
       TOOLBAR
       Fixed across the top; hidden until Edit mode is active.
       Uses a slightly darker background to separate from content.
    ============================================================ */
    #toolbar {
      display: none;               /* hidden in view mode */
      flex-shrink: 0;
      background-color: hsla(221, 50%, 8%, 1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 6px 10px;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      z-index: 100;
    }

    /* Show toolbar in edit mode */
    body.edit-mode #toolbar { display: flex; }

    /* Edit button — always visible, outside toolbar */
    #btn-edit {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 200;
      background-color: rgba(255,255,255,0.12);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    body.edit-mode #btn-edit { display: none; } /* hide when toolbar is active */

    /* ── Toolbar button base style ── */
    .tb-btn {
      background-color: rgba(255,255,255,0.08);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      padding: 4px 10px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .tb-btn:hover { background-color: rgba(255,255,255,0.18); }
    .tb-btn:active { background-color: rgba(255,255,255,0.25); }

    /* Save and Cancel get accent colors */
    #btn-save   { background-color: #4dd9ec; color: hsla(221,39%,11%,1); border-color: #4dd9ec; }
    #btn-cancel { background-color: rgba(255,100,100,0.2); border-color: rgba(255,100,100,0.4); }

    /* Highlight buttons get their chip colors */
    #btn-hl-blue   { background-color: #4a9eff; border-color: #4a9eff; color: #fff; }
    #btn-hl-yellow { background-color: #f5c842; border-color: #f5c842; color: hsla(221,39%,11%,1); }
    #btn-hl-remove { background-color: rgba(255,255,255,0.05); font-weight: 400; font-size: 0.75rem; }

    /* Toolbar visual separator */
    .tb-sep {
      width: 1px;
      height: 20px;
      background-color: rgba(255,255,255,0.15);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ============================================================
       CONTENT AREA
       This is the full RTE region. Scrollable so content isn't clipped.
    ============================================================ */
    #agenda-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;          /* <-- ADJUST: inner padding */
      outline: none;
    }

    /* Dashed border hint when in edit mode */
    body.edit-mode #agenda-content {
      outline: 1px dashed rgba(255,255,255,0.1);
      outline-offset: -4px;
    }

    /* ============================================================
       AGENDA CONTENT STYLES
       These classes are applied directly in the HTML content,
       so they survive save/load via innerHTML.
    ============================================================ */

    /* Title */
    #agenda-content h1,
    #agenda-content .agenda-title {
      font-size: 2.4rem;           /* <-- ADJUST */
      font-weight: 700;
      color: #4dd9ec;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    /* Subtitle */
    #agenda-content .agenda-subtitle {
      font-size: 1.7rem;           /* <-- ADJUST */
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin-bottom: 20px;
    }

    /* Divider */
    #agenda-content hr {
      border: none;
      border-top: 2px solid rgba(255,255,255,0.15);
      margin-bottom: 20px;
    }

    /* Section wrapper */
    #agenda-content .agenda-section {
      margin-bottom: 18px;         /* <-- ADJUST: space between sections */
    }

    /* "Today:" label row */
    #agenda-content .section-label {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    /* "Leave comments about:" sub-label */
    #agenda-content .section-sublabel {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    /* ── Highlight chips ── */
    #agenda-content .highlight-blue {
      background-color: #4a9eff;
      color: #ffffff;
      padding: 2px 10px;
      border-radius: 4px;
      font-weight: 700;
    }

    #agenda-content .highlight-yellow {
      background-color: #f5c842;
      color: hsla(221, 39%, 11%, 1);
      padding: 2px 10px;
      border-radius: 4px;
      font-weight: 700;
    }

    /* Blue header chip (e.g., "Discussion") */
    #agenda-content .section-header-highlight {
      display: inline-block;
      background-color: #4a9eff;
      color: #ffffff;
      padding: 2px 12px;
      border-radius: 4px;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* ============================================================
       LIST STYLES
       Applied to both top-level and nested <ul> elements.
       Nested lists (from indent) get dimmer, smaller bullets.
    ============================================================ */
    #agenda-content ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    /* Top-level list items */
    #agenda-content ul > li {
      position: relative;
      padding-left: 1.2em;
      font-size: 1.1rem;           /* <-- ADJUST */
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 7px;          /* <-- ADJUST: space between bullets */
    }

    #agenda-content ul > li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.1em;
    }

    /* Nested list items (indented sub-bullets) */
    #agenda-content ul ul > li {
      font-size: 1rem;
      font-weight: 400;
      padding-left: 1.4em;
      margin-bottom: 5px;
    }

    #agenda-content ul ul > li::before {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1em;
    }

    /* ============================================================
       EDIT MODE BOTTOM HINT
    ============================================================ */
    #edit-hint {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(74, 158, 255, 0.12);
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      text-align: center;
      padding: 4px;
      font-family: 'Quicksand', sans-serif;
    }

    body.edit-mode #edit-hint { display: block; }
  </style>
</head>
<body>

  <!-- ============================================================
       EDIT BUTTON — always visible in view mode (top-right corner)
  ============================================================ -->
  <button id="btn-edit" onclick="enterEditMode()">✏️ Edit</button>

  <!-- ============================================================
       TOOLBAR — only visible in edit mode
       Row 1: Session controls | Text formatting | Font size | Highlights
       Row 2: List controls
  ============================================================ -->
  <div id="toolbar">

    <!-- Session controls -->
    <button class="tb-btn" id="btn-save"   onclick="saveContent()">✓ Save</button>
    <button class="tb-btn" id="btn-cancel" onclick="cancelEdit()">✕ Cancel</button>

    <div class="tb-sep"></div>

    <!-- Text formatting -->
    <button class="tb-btn" onclick="fmt('bold')"      title="Bold"><b>B</b></button>
    <button class="tb-btn" onclick="fmt('italic')"    title="Italic"><i>I</i></button>
    <button class="tb-btn" onclick="fmt('underline')" title="Underline"><u>U</u></button>

    <div class="tb-sep"></div>

    <!-- Font size -->
    <button class="tb-btn" onclick="changeFontSize(-2)" title="Decrease font size">A−</button>
    <button class="tb-btn" onclick="changeFontSize(+2)" title="Increase font size">A+</button>

    <div class="tb-sep"></div>

    <!-- Highlight chips -->
    <button class="tb-btn" id="btn-hl-blue"   onclick="applyHighlight('highlight-blue')"   title="Blue highlight chip">H Blue</button>
    <button class="tb-btn" id="btn-hl-yellow" onclick="applyHighlight('highlight-yellow')" title="Yellow highlight chip">H Yellow</button>
    <button class="tb-btn" id="btn-hl-remove" onclick="removeHighlight()"                  title="Remove highlight">✕ H</button>

    <div class="tb-sep"></div>

    <!-- List controls -->
    <button class="tb-btn" onclick="fmt('insertUnorderedList')" title="Toggle bullet list">• Bullet</button>
    <button class="tb-btn" onclick="fmt('indent')"              title="Indent (sub-bullet)">→ In</button>
    <button class="tb-btn" onclick="fmt('outdent')"             title="Outdent">← Out</button>

  </div>

  <!-- ============================================================
       MAIN CONTENT AREA — the full RTE region
  ============================================================ -->
  <div id="agenda-content" contenteditable="false" spellcheck="false"></div>

  <!-- Bottom hint bar in edit mode -->
  <div id="edit-hint">✏️ Edit mode — select text to format • Enter for new line • Tab to indent bullets • ✓ Save when done</div>


<script>
  /* ============================================================
     DEFAULT CONTENT
     This HTML string is the template loaded when no saved content
     exists yet (first run, or after clearing localStorage).
     Edit the DEFAULT_HTML string to change the starting template.
  ============================================================ */
  const DEFAULT_HTML = `
    <h1 class="agenda-title">Today's Agenda</h1>
    <div class="agenda-subtitle">U5 Argument Writing</div>
    <hr />
    <div class="agenda-section">
      <div class="section-label">
        Today:&nbsp;
        <span class="highlight-blue">Finish Peer Review</span>
        &nbsp;<span class="highlight-yellow">(see Canvas)</span>
      </div>
      <div class="section-sublabel">Leave comments about:</div>
      <ul>
        <li>counterarguments: steelman or strawman?</li>
        <li>evidence with a thin or missing explanation</li>
        <li>line of reasoning: does the logic break or jump?</li>
        <li>something that is genuinely working: be specific, not just "good job"</li>
      </ul>
    </div>
    <div class="agenda-section">
      <div class="section-header-highlight">Discussion</div>
      <ul>
        <li><strong>Reader:</strong> explain comments</li>
        <li><strong>Writer:</strong> listen, take notes</li>
      </ul>
    </div>
  `;

  /* Storage key — change to "agenda-p2" etc. for separate class periods */
  const STORAGE_KEY = "classroomAgendaRTE";

  /* Snapshot of content when entering edit mode — used by Cancel */
  let editSnapshot = "";

  /* ============================================================
     INIT — load saved HTML or default on page load
  ============================================================ */
  const contentEl = document.getElementById('agenda-content');

  function loadContent() {
    const saved = localStorage.getItem(STORAGE_KEY);
    contentEl.innerHTML = saved || DEFAULT_HTML;
  }

  loadContent();

  /* ============================================================
     EDIT MODE — enable contenteditable and take a snapshot
     so Cancel can restore if the user bails out
  ============================================================ */
  function enterEditMode() {
    editSnapshot = contentEl.innerHTML;       // save current state for cancel
    contentEl.contentEditable = "true";
    contentEl.focus();
    document.body.classList.add('edit-mode');
  }

  /* ============================================================
     SAVE — persist innerHTML to localStorage, exit edit mode
  ============================================================ */
  function saveContent() {
    localStorage.setItem(STORAGE_KEY, contentEl.innerHTML);
    contentEl.contentEditable = "false";
    document.body.classList.remove('edit-mode');
  }

  /* ============================================================
     CANCEL — restore snapshot, exit edit mode without saving
  ============================================================ */
  function cancelEdit() {
    contentEl.innerHTML = editSnapshot;       // revert all changes
    contentEl.contentEditable = "false";
    document.body.classList.remove('edit-mode');
  }

  /* ============================================================
     fmt() — thin wrapper around document.execCommand
     Handles bold, italic, underline, lists, indent/outdent.
     Note: execCommand is deprecated but still universally supported.
  ============================================================ */
  function fmt(command) {
    contentEl.focus();
    document.execCommand(command, false, null);
  }

  /* ============================================================
     changeFontSize(delta) — increases or decreases font size
     of the selected text by delta pixels.

     Strategy: execCommand('fontSize', '7') inserts a <font size="7">
     marker tag around the selection. We immediately replace those
     markers with <span style="font-size: Xpx"> elements.
  ============================================================ */
  function changeFontSize(delta) {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;      // require a selection

    /* Detect current font size of selection start for relative change */
    const anchorNode = sel.getRangeAt(0).startContainer;
    const anchorEl   = anchorNode.nodeType === 3 ? anchorNode.parentElement : anchorNode;
    const currentPx  = parseFloat(window.getComputedStyle(anchorEl).fontSize) || 16;
    const newPx      = Math.max(8, Math.min(96, currentPx + delta)); // clamp 8–96px

    contentEl.focus();

    /* Use size "7" as a unique marker — unlikely to appear otherwise */
    document.execCommand('fontSize', false, '7');

    /* Replace all <font size="7"> markers with properly sized <span> elements */
    contentEl.querySelectorAll('font[size="7"]').forEach(fontEl => {
      const span = document.createElement('span');
      span.style.fontSize = newPx + 'px';
      span.innerHTML = fontEl.innerHTML;
      fontEl.parentNode.replaceChild(span, fontEl);
    });
  }

  /* ============================================================
     applyHighlight(className) — wraps selected text in a
     <span class="highlight-blue"> or <span class="highlight-yellow">
     chip. Uses surroundContents with a fallback for cross-element
     selections.
  ============================================================ */
  function applyHighlight(className) {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;      // require a selection

    const range = sel.getRangeAt(0);
    const span  = document.createElement('span');
    span.className = className;

    try {
      /* Works when selection is entirely within one element */
      range.surroundContents(span);
    } catch (e) {
      /* Fallback: extract the selection content and re-insert it
         wrapped in our span. Handles selections that cross elements. */
      const fragment = range.extractContents();
      span.appendChild(fragment);
      range.insertNode(span);
    }

    sel.removeAllRanges(); // deselect after applying
  }

  /* ============================================================
     removeHighlight() — removes blue/yellow chip from selected
     text or from the element the cursor is currently inside.
     Also runs execCommand('removeFormat') to strip bold/italic/etc.
  ============================================================ */
  function removeHighlight() {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;

    const node  = sel.getRangeAt(0).startContainer;
    const el    = node.nodeType === 3 ? node.parentElement : node;

    /* Walk up the DOM to find a highlight span */
    const hlSpan = el.closest('.highlight-blue, .highlight-yellow');

    if (hlSpan) {
      /* Unwrap the span: move all its children before it, then remove it */
      const parent = hlSpan.parentNode;
      while (hlSpan.firstChild) {
        parent.insertBefore(hlSpan.firstChild, hlSpan);
      }
      parent.removeChild(hlSpan);
    }

    /* Also strip execCommand formatting (bold, italic, font-size spans, etc.) */
    document.execCommand('removeFormat', false, null);
  }

  /* ============================================================
     KEYBOARD SHORTCUT — Escape exits edit mode (same as Cancel)
  ============================================================ */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.body.classList.contains('edit-mode')) {
      cancelEdit();
    }
  });
</script>

</body>
</html>
